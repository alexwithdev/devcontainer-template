name: Build and Push Docker Images

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      base-matrix: ${{ steps.set-matrix.outputs.base-matrix }}
      ubuntu-matrix: ${{ steps.set-matrix.outputs.ubuntu-matrix }}
      lang-matrix: ${{ steps.set-matrix.outputs.lang-matrix }}
      build-base: ${{ steps.set-matrix.outputs.build-base }}
      build-ubuntu: ${{ steps.set-matrix.outputs.build-ubuntu }}
      build-android: ${{ steps.set-matrix.outputs.build-android }}
      build-remaining: ${{ steps.set-matrix.outputs.build-remaining }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.ref_type != 'tag'
        with:
          filters: |
            base:
              - 'src/templates/base/**'
            ubuntu:
              - 'src/templates/ubuntu/**'
            node:
              - 'src/templates/node/**'
            python:
              - 'src/templates/python/**'
            go:
              - 'src/templates/go/**'
            desktop:
              - 'src/templates/desktop/**'
            android:
              - 'src/templates/android/**'
            workflow:
              - '.github/workflows/**'

      - name: Set build matrix
        id: set-matrix
        run: |
          IS_TAG="${{ github.ref_type == 'tag' }}"
          BASE_CHANGED="${{ steps.filter.outputs.base }}"
          UBUNTU_CHANGED="${{ steps.filter.outputs.ubuntu }}"
          NODE_CHANGED="${{ steps.filter.outputs.node }}"
          PYTHON_CHANGED="${{ steps.filter.outputs.python }}"
          GO_CHANGED="${{ steps.filter.outputs.go }}"
          DESKTOP_CHANGED="${{ steps.filter.outputs.desktop }}"
          ANDROID_CHANGED="${{ steps.filter.outputs.android }}"
          WORKFLOW_CHANGED="${{ steps.filter.outputs.workflow }}"

          # Determine if we should build everything
          if [[ "$IS_TAG" == "true" ]] || [[ "$WORKFLOW_CHANGED" == "true" ]]; then
            BUILD_ALL=true
          else
            BUILD_ALL=false
          fi

          # Determine base/ubuntu image build independently
          if [[ "$BUILD_ALL" == "true" ]] || [[ "$BASE_CHANGED" == "true" ]]; then
            BUILD_BASE=true
          else
            BUILD_BASE=false
          fi

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$UBUNTU_CHANGED" == "true" ]]; then
            BUILD_UBUNTU=true
          else
            BUILD_UBUNTU=false
          fi

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$UBUNTU_CHANGED" == "true" ]] || [[ "$ANDROID_CHANGED" == "true" ]]; then
            BUILD_ANDROID=true
          else
            BUILD_ANDROID=false
          fi

          # Generate base matrix
          if [[ "$BUILD_BASE" == "true" ]]; then
            BASE_MATRIX='{"include":[{"name":"base","dockerfile":"src/templates/base/Dockerfile","context":"src/templates/base","description":"Base Alpine development container"}]}'
          else
            BASE_MATRIX='{"include":[]}'
          fi

          # Generate ubuntu matrix
          if [[ "$BUILD_UBUNTU" == "true" ]]; then
            UBUNTU_MATRIX='{"include":[{"name":"ubuntu","dockerfile":"src/templates/ubuntu/Dockerfile","context":"src/templates/ubuntu","description":"Base Ubuntu development container"}]}'
          else
            UBUNTU_MATRIX='{"include":[]}'
          fi

          # Generate language matrix
          LANG_ITEMS=()

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$BASE_CHANGED" == "true" ]] || [[ "$NODE_CHANGED" == "true" ]]; then
            LANG_ITEMS+=('{"name":"node","dockerfile":"src/templates/node/Dockerfile","context":"src/templates/node","description":"Node.js development container"}')
          fi

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$BASE_CHANGED" == "true" ]] || [[ "$PYTHON_CHANGED" == "true" ]]; then
            LANG_ITEMS+=('{"name":"python","dockerfile":"src/templates/python/Dockerfile","context":"src/templates/python","description":"Python development container"}')
          fi

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$BASE_CHANGED" == "true" ]] || [[ "$GO_CHANGED" == "true" ]]; then
            LANG_ITEMS+=('{"name":"go","dockerfile":"src/templates/go/Dockerfile","context":"src/templates/go","description":"Go development container"}')
          fi

          if [[ "$BUILD_ALL" == "true" ]] || [[ "$UBUNTU_CHANGED" == "true" ]] || [[ "$DESKTOP_CHANGED" == "true" ]]; then
            LANG_ITEMS+=('{"name":"desktop","dockerfile":"src/templates/desktop/Dockerfile","context":"src/templates/desktop","description":"Desktop development container with VNC"}')
          fi

          # Build language matrix JSON
          if [ ${#LANG_ITEMS[@]} -eq 0 ]; then
            LANG_MATRIX='{"include":[]}'
            BUILD_REMAINING=false
          else
            # Join array with commas
            JOINED=$(IFS=,; echo "${LANG_ITEMS[*]}")
            LANG_MATRIX="{\"include\":[$JOINED]}"
            BUILD_REMAINING=true
          fi

          # Set outputs
          echo "base-matrix=$BASE_MATRIX" >> $GITHUB_OUTPUT
          echo "ubuntu-matrix=$UBUNTU_MATRIX" >> $GITHUB_OUTPUT
          echo "lang-matrix=$LANG_MATRIX" >> $GITHUB_OUTPUT
          echo "build-base=$BUILD_BASE" >> $GITHUB_OUTPUT
          echo "build-ubuntu=$BUILD_UBUNTU" >> $GITHUB_OUTPUT
          echo "build-android=$BUILD_ANDROID" >> $GITHUB_OUTPUT
          echo "build-remaining=$BUILD_REMAINING" >> $GITHUB_OUTPUT

          # Debug output
          echo "::notice::Base Matrix: $BASE_MATRIX"
          echo "::notice::Ubuntu Matrix: $UBUNTU_MATRIX"
          echo "::notice::Lang Matrix: $LANG_MATRIX"
          echo "::notice::Build Base: $BUILD_BASE"
          echo "::notice::Build Ubuntu: $BUILD_UBUNTU"
          echo "::notice::Build Android: $BUILD_ANDROID"
          echo "::notice::Build Remaining: $BUILD_REMAINING"

  build-and-publish-base:
    needs: detect-changes
    if: needs.detect-changes.outputs.build-base == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.base-matrix) }}
    uses: ./.github/workflows/build-and-publish-image.yml
    with:
      name: ${{ matrix.name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
      description: ${{ matrix.description }}
      registry: ghcr.io
      image_name: ${{ github.repository }}

  build-and-publish-ubuntu:
    needs: detect-changes
    if: needs.detect-changes.outputs.build-ubuntu == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.ubuntu-matrix) }}
    uses: ./.github/workflows/build-and-publish-image.yml
    with:
      name: ${{ matrix.name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
      description: ${{ matrix.description }}
      registry: ghcr.io
      image_name: ${{ github.repository }}

  build-and-publish-android:
    needs:
      [
        detect-changes,
        build-and-publish-ubuntu,
        build-and-publish-remaining-images,
      ]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-publish-ubuntu.result == 'success' || needs.build-and-publish-ubuntu.result == 'skipped') &&
      needs.detect-changes.outputs.build-android == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-publish-image.yml
    with:
      name: android
      dockerfile: src/templates/android/Dockerfile
      context: src/templates/android
      description: Android development container with Android Studio
      registry: ghcr.io
      image_name: ${{ github.repository }}

  build-and-publish-remaining-images:
    needs: [detect-changes, build-and-publish-base, build-and-publish-ubuntu]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-publish-base.result == 'success' || needs.build-and-publish-base.result == 'skipped') &&
      (needs.build-and-publish-ubuntu.result == 'success' || needs.build-and-publish-ubuntu.result == 'skipped') &&
      needs.detect-changes.outputs.build-remaining == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.lang-matrix) }}
    uses: ./.github/workflows/build-and-publish-image.yml
    with:
      name: ${{ matrix.name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}
      description: ${{ matrix.description }}
      registry: ghcr.io
      image_name: ${{ github.repository }}
